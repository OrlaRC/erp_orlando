<div class="login-container">

  <p-card header="Crear Cuenta" class="login-card">

    <div class="form">

      <div class="field">
        <label>Usuario</label>
        <input pInputText [(ngModel)]="usuario" />
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input pInputText type="password" [(ngModel)]="password" />
      </div>

      <button 
        pButton 
        label="Registrarse" 
        icon="pi pi-user-plus"
        class="login-btn"
        (click)="registrar()">
      </button>

      <div class="register-link">
        ¿Ya tienes cuenta?
        <a routerLink="/login">Inicia sesión</a>
      </div>

    </div>

  </p-card>

</div>
