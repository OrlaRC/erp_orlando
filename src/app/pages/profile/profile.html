<div class="profile-container">

  <p-card header="Perfil de Usuario">

    <div class="profile-grid">

      <div>
        <strong>Usuario:</strong>
        <p>{{ usuario?.usuario }}</p>
      </div>

      <div>
        <strong>Nombre:</strong>
        <p>{{ usuario?.nombre }}</p>
      </div>

      <div>
        <strong>Email:</strong>
        <p>{{ usuario?.email }}</p>
      </div>

      <div>
        <strong>Teléfono:</strong>
        <p>{{ usuario?.telefono }}</p>
      </div>

      <div>
        <strong>Dirección:</strong>
        <p>{{ usuario?.direccion }}</p>
      </div>

      <div>
        <strong>Edad:</strong>
        <p>{{ usuario?.edad }}</p>
      </div>

    </div>

  </p-card>

</div>
